<!DOCTYPE html>
<html lang="en" data-color-mode="dark" data-dark-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Are you human?</title>
  <link rel="icon" type="image/png" href="logo.png" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body>

  <main class="main">
    <div class="card">
      <div class="logo-icon">
        <img src="logo.png" alt="Logo" />
      </div>

      <h1 class="card-title">Are you human?</h1>
      <p class="card-subtitle">
        Complete the quick check below to continue.
      </p>

      <div class="divider"></div>

      <div class="turnstile-wrapper">
        <div id="turnstile-container"></div>
      </div>

      <p class="status-message" id="statusMsg"></p>

      <div class="info-box">
        <p>
          Powered by <a href="https://www.cloudflare.com/products/turnstile/" target="_blank" rel="noopener">Cloudflare Turnstile</a>. Your data is not collected or stored.
</p>
      </div>
    </div>
  </main>

<script src="app.js"></script>
</body>
</html>
